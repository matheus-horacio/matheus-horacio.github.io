<style>
/* ── TOKENS ── */
:root {
  --teal:       #01B8AF;
  --teal-dark:  #019a92;
  --teal-dim:   rgba(1,184,175,0.12);
  --ink:        #111111;
  --ink-soft:   #1e1e1e;
  --ink-mid:    #2e2e2e;
  --grey:       #58595B;
  --grey-light: #8a8a8a;
  --salt:       #F0F0F0;
  --paper:      #FAFAFA;
  --white:      #FFFFFF;
  --black:      #000000;
  --serif-size: clamp(3rem, 7vw, 5.5rem);
}

/* ── RESET ── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; scroll-padding-top:56px; }
body { font-family:'Roboto',sans-serif; color:var(--ink); background:var(--white); line-height:1.7; overflow-x:hidden; }
img { display:block; max-width:100%; }
a { color:inherit; }

/* ── HELPERS ── */
.container { max-width:1160px; margin:0 auto; padding:0 32px; width:100%; }
.label {
  display:inline-block; font-family:'Lexend',sans-serif; font-size:0.75rem;
  font-weight:700; letter-spacing:2.5px; text-transform:uppercase; color:var(--teal);
}
.divider { width:40px; height:3px; background:var(--teal); margin:20px 0 32px; }
.divider--center { margin-left:auto; margin-right:auto; }

/* ── BUTTONS ── */
.btn {
  display:inline-flex; align-items:center; gap:10px;
  padding:15px 32px; border-radius:3px; font-family:'Lexend',sans-serif;
  font-weight:700; font-size:0.875rem; letter-spacing:0.8px; text-transform:uppercase;
  text-decoration:none; cursor:pointer; border:none; transition:all 0.25s ease;
}
.btn--teal  { background:var(--teal); color:var(--white); }
.btn--teal:hover  { background:var(--teal-dark); transform:translateY(-2px); box-shadow:0 8px 24px rgba(1,184,175,0.35); }
.btn--ghost { background:transparent; color:var(--white); border:1.5px solid rgba(255,255,255,0.4); }
.btn--ghost:hover { border-color:var(--white); background:rgba(255,255,255,0.08); transform:translateY(-2px); }
.btn--ghost-dark { background:transparent; color:var(--ink); border:1.5px solid rgba(0,0,0,0.2); }
.btn--ghost-dark:hover { border-color:var(--ink); background:rgba(0,0,0,0.04); }
.btn svg { width:18px; height:18px; fill:currentColor; flex-shrink:0; }

/* ══════════════════════════════════════
   NAVBAR
══════════════════════════════════════ */
.navbar {
  position:fixed; top:0; left:0; right:0; z-index:1000;
  background:rgba(17,17,17,0.96); backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(255,255,255,0.06);
  padding:0 32px; height:58px;
  transition:all 0.3s ease;
}
.navbar.scrolled { background:rgba(17,17,17,0.99); }
.navbar-container { max-width:1160px; margin:0 auto; height:100%; display:flex; justify-content:space-between; align-items:center; }
.navbar-brand { font-family:'Lexend',sans-serif; font-size:1rem; font-weight:800; color:var(--teal); text-decoration:none; letter-spacing:-0.03em; }
.navbar-menu { display:flex; gap:32px; list-style:none; align-items:center; }
.navbar-menu a {
  color:rgba(240,240,240,0.7); text-decoration:none; font-size:0.8125rem;
  font-family:'Lexend',sans-serif; font-weight:500; letter-spacing:0.5px;
  transition:color 0.2s ease; position:relative;
}
.navbar-menu a:hover { color:var(--teal); }
.navbar-toggle { display:none; background:transparent; border:none; cursor:pointer; padding:6px; flex-direction:column; gap:5px; }
.navbar-toggle span { display:block; width:24px; height:2px; background:var(--teal); transition:all 0.3s ease; border-radius:2px; position:relative; }
.navbar-toggle.active span:nth-child(1) { transform:rotate(45deg); position:absolute; top:50%; margin-top:-1px; }
.navbar-toggle.active span:nth-child(2) { opacity:0; }
.navbar-toggle.active span:nth-child(3) { transform:rotate(-45deg); position:absolute; top:50%; margin-top:-1px; }

/* ══════════════════════════════════════
   HERO — editorial split
══════════════════════════════════════ */
.hero {
  min-height:100vh;
  display:grid; grid-template-columns:1fr 1fr;
  background:var(--ink);
  position:relative; overflow:hidden;
}

/* ruído/textura sutil */
.hero::before {
  content:''; position:absolute; inset:0; z-index:1;
  background:
    radial-gradient(ellipse at 10% 60%, rgba(1,184,175,0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 90% 20%, rgba(1,184,175,0.05) 0%, transparent 50%);
  pointer-events:none;
}

.hero-text-col {
  display:flex; flex-direction:column; justify-content:center;
  padding:120px 56px 80px 40px;
  position:relative; z-index:2;
}
.hero-overline { color:var(--teal); font-family:'Lexend',sans-serif; font-size:0.75rem; font-weight:700; letter-spacing:3px; text-transform:uppercase; margin-bottom:28px; }
.hero-name {
  font-family:'Lexend',sans-serif; font-weight:900;
  font-size:clamp(3rem, 6vw, 5.25rem);
  line-height:0.95; letter-spacing:-0.04em;
  color:var(--white); margin-bottom:24px;
}
.hero-name span { color:var(--teal); }
.hero-rule { width:48px; height:3px; background:var(--teal); margin:28px 0; }
.hero-tagline {
  font-size:clamp(1rem, 1.5vw, 1.2rem);
  color:rgba(240,240,240,0.65);
  max-width:420px; line-height:1.75;
  margin-bottom:44px;
}
.hero-actions { display:flex; gap:14px; flex-wrap:wrap; }

/* foto — coluna direita */
.hero-photo-col {
  position:relative; overflow:hidden;
}
.hero-photo-col::after {
  content:''; position:absolute; inset:0;
  background:linear-gradient(to right, var(--ink) 0%, transparent 30%);
  z-index:1; pointer-events:none;
}
.hero-photo-col img {
  width:100%; height:100%;
  object-fit:cover; object-position:center top;
  filter:grayscale(15%) contrast(1.05);
  transition:transform 6s ease;
}
.hero:hover .hero-photo-col img { transform:scale(1.03); }

/* scroll cue */
.hero-scroll-cue {
  position:absolute; bottom:36px; left:50%; transform:translateX(-50%);
  z-index:3; display:flex; flex-direction:column; align-items:center; gap:8px;
  color:rgba(255,255,255,0.3); font-family:'Lexend',sans-serif; font-size:0.6875rem;
  letter-spacing:2px; text-transform:uppercase;
}
.hero-scroll-cue span { animation:scrollBob 2.2s ease-in-out infinite; }
@keyframes scrollBob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(6px)} }

/* ══════════════════════════════════════
   SOBRE — dois colunas
══════════════════════════════════════ */
.about { background:var(--paper); padding:100px 0; }
.about-grid {
  display:grid; grid-template-columns:1fr 1.6fr;
  gap:72px; align-items:start;
}
.about-left { position:sticky; top:90px; }
.about-photo {
  width:100%; aspect-ratio:3/4;
  object-fit:cover; object-position:center top;
  border-radius:4px;
  box-shadow:0 20px 60px rgba(0,0,0,0.15);
}
.about-right p { color:var(--grey); font-size:1.0625rem; line-height:1.85; margin-bottom:1.5rem; }
.about-right p:last-child { margin-bottom:0; }
.about-right a { color:var(--teal); font-weight:600; text-decoration:none; transition:color 0.2s; }
.about-right a:hover { color:var(--teal-dark); }

/* pull quote */
.pull-quote {
  margin:48px 0;
  padding:36px 40px;
  border-left:4px solid var(--teal);
  background:var(--white);
  border-radius:0 4px 4px 0;
  box-shadow:0 2px 20px rgba(0,0,0,0.05);
}
.pull-quote p {
  font-family:'Lexend',sans-serif !important;
  font-size:clamp(1.2rem, 2vw, 1.5rem) !important;
  font-weight:500 !important; font-style:italic;
  color:var(--ink-mid) !important; line-height:1.55 !important;
  margin:0 !important;
}

/* ══════════════════════════════════════
   FRASE DE IMPACTO — seção separadora
══════════════════════════════════════ */
.impact {
  background:var(--ink); padding:100px 32px;
  text-align:center; position:relative; overflow:hidden;
}
.impact::before {
  content:'\201C'; font-family:'Lexend',sans-serif; font-size:28rem; font-weight:900;
  color:rgba(1,184,175,0.04); position:absolute; top:-80px; left:50%;
  transform:translateX(-50%); line-height:1; pointer-events:none; z-index:0;
  letter-spacing:-0.05em;
}
.impact-inner { position:relative; z-index:1; max-width:820px; margin:0 auto; }
.impact-quote {
  font-family:'Lexend',sans-serif;
  font-size:clamp(1.75rem, 4vw, 3rem);
  font-weight:700; line-height:1.25; letter-spacing:-0.02em;
  color:var(--white);
  margin-bottom:32px;
}
.impact-quote em { color:var(--teal); font-style:normal; }
.impact-author { font-size:0.875rem; color:rgba(255,255,255,0.35); font-family:'Lexend',sans-serif; letter-spacing:1.5px; text-transform:uppercase; }

/* ══════════════════════════════════════
   ESTATÍSTICAS
══════════════════════════════════════ */
.stats { background:var(--white); padding:80px 0; border-top:1px solid rgba(0,0,0,0.06); border-bottom:1px solid rgba(0,0,0,0.06); }
.stats-grid { display:grid; grid-template-columns:repeat(3,1fr); }
.stat-item {
  padding:40px 48px;
  border-right:1px solid rgba(0,0,0,0.07);
  text-align:center;
}
.stat-item:last-child { border-right:none; }
.stat-number {
  font-family:'Lexend',sans-serif; font-size:clamp(3rem, 6vw, 5rem);
  font-weight:900; color:var(--teal); letter-spacing:-0.04em;
  line-height:1; display:block; margin-bottom:12px;
}
.stat-label { font-family:'Lexend',sans-serif; font-size:0.8rem; font-weight:600; color:var(--grey-light); text-transform:uppercase; letter-spacing:2px; }

/* ══════════════════════════════════════
   GALERIA
══════════════════════════════════════ */
.gallery { background:var(--ink-soft); padding:100px 0 80px; }
.gallery .section-header { text-align:left; max-width:none; margin:0 0 48px; }
.gallery .section-header h2 { color:var(--white); font-family:'Lexend',sans-serif; font-size:clamp(1.75rem,4vw,2.75rem); font-weight:800; letter-spacing:-0.03em; }
.gallery .section-header p { color:rgba(255,255,255,0.45); margin-top:8px; }
.carousel { position:relative; overflow:hidden; border-radius:6px; background:var(--ink); }
.carousel-track { display:flex; transition:transform 0.5s cubic-bezier(0.4,0,0.2,1); will-change:transform; }
.carousel-slide { min-width:100%; flex-shrink:0; position:relative; }
.carousel-slide img { width:100%; aspect-ratio:16/9; object-fit:cover; object-position:center center; display:block; background-color:var(--ink); }
  .carousel-caption {
  position:absolute; bottom:0; left:0; right:0;
  background:linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 100%);
  padding:48px 32px 24px; color:var(--white);
}
.carousel-caption p { font-size:1rem; font-family:'Lexend',sans-serif; font-weight:500; margin:0; }
.carousel-btn {
  position:absolute; top:50%; transform:translateY(-50%);
  background:rgba(1,184,175,0.9); border:none; width:48px; height:48px;
  border-radius:50%; cursor:pointer; z-index:10;
  display:flex; align-items:center; justify-content:center; transition:all 0.2s ease;
}
.carousel-btn:hover { background:var(--teal); transform:translateY(-50%) scale(1.08); }
.carousel-btn svg { width:22px; height:22px; fill:var(--white); }
.carousel-btn.prev { left:20px; }
.carousel-btn.next { right:20px; }
.carousel-dots { display:flex; justify-content:center; gap:8px; margin-top:20px; }
.carousel-dot { width:8px; height:8px; border-radius:50%; background:rgba(255,255,255,0.2); border:none; cursor:pointer; transition:all 0.25s ease; padding:0; }
.carousel-dot.active { background:var(--teal); transform:scale(1.3); }
.carousel-dot:hover { background:rgba(1,184,175,0.6); }

/* ══════════════════════════════════════
   ENTREVISTAS
══════════════════════════════════════ */
.interviews { background:var(--paper); padding:100px 0; }
.interviews .section-header { margin-bottom:56px; }
.interviews .section-header h2 { font-family:'Lexend',sans-serif; font-size:clamp(1.75rem,4vw,2.75rem); font-weight:800; color:var(--ink); letter-spacing:-0.03em; }
.interviews .section-header p { color:var(--grey); margin-top:10px; }
.featured-videos { display:grid; grid-template-columns:repeat(auto-fit,minmax(460px,1fr)); gap:28px; margin-bottom:44px; }
.videos-grid    { display:grid; grid-template-columns:repeat(auto-fit,minmax(320px,1fr)); gap:24px; }
.video-card { background:var(--white); border-radius:6px; overflow:hidden; box-shadow:0 2px 16px rgba(0,0,0,0.07); text-decoration:none; color:inherit; display:block; transition:all 0.25s ease; }
.video-card:hover { transform:translateY(-5px); box-shadow:0 12px 32px rgba(0,0,0,0.13); }
.video-thumbnail { position:relative; padding-bottom:56.25%; background:var(--ink); overflow:hidden; }
.video-thumbnail img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; transition:transform 0.4s ease; }
.video-card:hover .video-thumbnail img { transform:scale(1.04); }
.play-overlay {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  width:64px; height:64px; background:rgba(1,184,175,0.92);
  border-radius:50%; display:flex; align-items:center; justify-content:center;
  transition:all 0.25s ease;
}
.video-card:hover .play-overlay { background:var(--teal); transform:translate(-50%,-50%) scale(1.1); }
.play-overlay svg { width:26px; height:26px; fill:var(--white); margin-left:3px; }
.video-info { padding:20px 22px; }
.featured-badge { display:inline-block; background:var(--teal); color:var(--white); padding:4px 12px; border-radius:3px; font-size:0.6875rem; font-weight:700; text-transform:uppercase; letter-spacing:1px; margin-bottom:10px; font-family:'Lexend',sans-serif; }
.video-info h3 { color:var(--ink); font-family:'Lexend',sans-serif; font-size:1.0625rem; font-weight:700; line-height:1.35; margin-bottom:6px; }
.video-info p  { color:var(--grey); font-size:0.9rem; margin:0; }
.featured-card .play-overlay { width:76px; height:76px; }
.featured-card .video-info { padding:22px 26px; }
.featured-card h3 { font-size:1.25rem; }

/* ══════════════════════════════════════
   BLOG / SUBSTACK
══════════════════════════════════════ */
.blog { background:var(--ink); padding:100px 0; }
.substack-wrap {
  max-width:660px; margin:0 auto; text-align:center;
  padding:72px 56px;
  border:1px solid rgba(1,184,175,0.25);
  border-radius:8px;
  background:rgba(1,184,175,0.04);
  position:relative; overflow:hidden;
}
.substack-wrap::before {
  content:''; position:absolute; top:-60px; right:-60px;
  width:240px; height:240px; border-radius:50%;
  background:radial-gradient(circle, rgba(1,184,175,0.1) 0%, transparent 70%);
  pointer-events:none;
}
.substack-icon-wrap {
  width:88px; height:88px; margin:0 auto 28px;
  background:var(--teal); border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 0 0 12px rgba(1,184,175,0.1);
}
.substack-icon-wrap svg { width:44px; height:44px; fill:var(--white); }
.substack-badge-el {
  display:inline-block; color:var(--teal);
  font-family:'Lexend',sans-serif; font-size:0.75rem; font-weight:700;
  letter-spacing:2.5px; text-transform:uppercase; margin-bottom:18px;
}
.substack-title { font-family:'Lexend',sans-serif; font-size:clamp(1.75rem,4vw,2.25rem); font-weight:800; color:var(--white); letter-spacing:-0.03em; margin-bottom:16px; line-height:1.2; }
.substack-desc { color:rgba(255,255,255,0.5); font-size:1rem; line-height:1.8; margin-bottom:36px; }
.btn-substack {
  display:inline-flex; align-items:center; gap:10px;
  background:var(--teal); color:var(--white);
  padding:16px 36px; border-radius:3px;
  font-family:'Lexend',sans-serif; font-weight:700; font-size:0.875rem;
  text-decoration:none; text-transform:uppercase; letter-spacing:0.8px;
  transition:all 0.25s ease;
}
.btn-substack:hover { background:var(--teal-dark); transform:translateY(-2px); box-shadow:0 8px 24px rgba(1,184,175,0.4); }
.btn-substack svg { width:18px; height:18px; fill:var(--white); }

/* ══════════════════════════════════════
   PALESTRAS
══════════════════════════════════════ */
.palestras { background:var(--paper); padding:100px 0; }

/* statement line */
.palestras-statement {
  display:grid; grid-template-columns:1fr 1fr;
  gap:48px; align-items:end;
  margin-bottom:80px;
  padding-bottom:64px;
  border-bottom:1px solid rgba(0,0,0,0.08);
}
.palestras-statement-left {}
.palestras-headline {
  font-family:'Lexend',sans-serif;
  font-size:clamp(2.25rem, 5vw, 4rem);
  font-weight:900; line-height:1.05;
  letter-spacing:-0.04em; color:var(--ink);
}
.palestras-headline span { color:var(--teal); }
.palestras-statement-right {}
.palestras-statement-right p { color:var(--grey); font-size:1.05rem; line-height:1.8; margin-bottom:0; }
.palestras-agenda-badge {
  display:inline-flex; align-items:center; gap:8px;
  background:rgba(1,184,175,0.1); border:1px solid rgba(1,184,175,0.3);
  color:var(--teal); padding:8px 18px; border-radius:24px;
  font-family:'Lexend',sans-serif; font-size:0.8125rem; font-weight:700;
  letter-spacing:0.5px; margin-bottom:28px;
}
.palestras-agenda-badge::before { content:'●'; font-size:0.5rem; animation:blink 1.5s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

/* cards */
.palestras-cards { display:grid; grid-template-columns:1fr 1fr; gap:24px; margin-bottom:16px; }
.p-card {
  background:var(--white); border:1px solid rgba(0,0,0,0.08);
  border-radius:8px; padding:44px 40px;
  transition:all 0.3s ease; position:relative; overflow:hidden;
}
.p-card::before {
  content:''; position:absolute; top:0; left:0; right:0;
  height:4px; background:var(--teal); transform:scaleX(0);
  transform-origin:left; transition:transform 0.35s ease;
}
.p-card:hover { border-color:transparent; box-shadow:0 12px 40px rgba(0,0,0,0.1); transform:translateY(-4px); }
.p-card:hover::before { transform:scaleX(1); }
.p-card-badge {
  display:inline-block; padding:5px 14px; border-radius:20px;
  font-family:'Lexend',sans-serif; font-size:0.7rem; font-weight:700;
  text-transform:uppercase; letter-spacing:1.2px; margin-bottom:20px;
}

/* ── MENU MOBILE ── */
(function(){
  const toggle = document.querySelector('.navbar-toggle');
  const menu   = document.querySelector('.navbar-menu');
  toggle.addEventListener('click', ()=>{ toggle.classList.toggle('active'); menu.classList.toggle('active'); });
  document.querySelectorAll('.navbar-menu a').forEach(l=>l.addEventListener('click',()=>{ toggle.classList.remove('active'); menu.classList.remove('active'); }));
  document.addEventListener('click', e=>{ if(!toggle.contains(e.target)&&!menu.contains(e.target)){ toggle.classList.remove('active'); menu.classList.remove('active'); }});
  window.addEventListener('scroll', ()=>{ document.querySelector('.navbar').classList.toggle('scrolled', window.pageYOffset>80); });
})();

/* ── CARROSSEL ── */
(function(){
  const track = document.getElementById('galeria-track');
  if(!track) return;
  const slides = Array.from(track.children);
  const dotsEl = document.getElementById('galeria-dots');
  let cur=0, tot=slides.length;
  slides.forEach((_,i)=>{ const d=document.createElement('button'); d.className='carousel-dot'; d.setAttribute('aria-label',`Slide ${i+1}`); if(i===0)d.classList.add('active'); d.addEventListener('click',()=>goTo(i)); dotsEl.appendChild(d); });
  const dots = Array.from(dotsEl.children);
  function goTo(n){ cur=(n+tot)%tot; track.style.transform=`translateX(-${cur*100}%)`; dots.forEach((d,i)=>d.classList.toggle('active',i===cur)); }
  document.querySelector('.carousel-btn.prev').addEventListener('click',()=>goTo(cur-1));
  document.querySelector('.carousel-btn.next').addEventListener('click',()=>goTo(cur+1));
  const car=document.querySelector('.carousel');
  let ap=setInterval(()=>goTo(cur+1),5000);
  car.addEventListener('mouseenter',()=>clearInterval(ap));
  car.addEventListener('mouseleave',()=>{ ap=setInterval(()=>goTo(cur+1),5000); });
  document.addEventListener('keydown',e=>{ if(e.key==='ArrowLeft')goTo(cur-1); if(e.key==='ArrowRight')goTo(cur+1); });
  let ts=0;
  car.addEventListener('touchstart',e=>{ ts=e.changedTouches[0].screenX; });
  car.addEventListener('touchend',e=>{ const d=e.changedTouches[0].screenX-ts; if(d<-50)goTo(cur+1); if(d>50)goTo(cur-1); });
})();
</script>
