(function() {
  const toggle = document.querySelector('.navbar-toggle');
  const menu   = document.querySelector('.navbar-menu');

  toggle.addEventListener('click', () => {
    toggle.classList.toggle('active');
    menu.classList.toggle('active');
  });

  document.querySelectorAll('.navbar-menu a').forEach(link => {
    link.addEventListener('click', () => {
      toggle.classList.remove('active');
      menu.classList.remove('active');
    });
  });

  document.addEventListener('click', (e) => {
    if (!toggle.contains(e.target) && !menu.contains(e.target)) {
      toggle.classList.remove('active');
      menu.classList.remove('active');
    }
  });

  const navbar = document.querySelector('.navbar');
  window.addEventListener('scroll', () => {
    navbar.classList.toggle('scrolled', window.pageYOffset > 100);
  });
})();

/* ══════════════════════════════════════════════
   CARROSSEL
══════════════════════════════════════════════ */
(function() {
  const track = document.getElementById('galeria-track');
  if (!track) return;

  const slides       = Array.from(track.children);
  const dotsContainer = document.getElementById('galeria-dots');
  const prevBtn      = document.querySelector('.carousel-btn.prev');
  const nextBtn      = document.querySelector('.carousel-btn.next');
  let currentIndex   = 0;
  const total        = slides.length;

  slides.forEach((_, i) => {
    const dot = document.createElement('button');
    dot.classList.add('carousel-dot');
    dot.setAttribute('aria-label', `Slide ${i + 1}`);
    if (i === 0) dot.classList.add('active');
    dot.addEventListener('click', () => goTo(i));
    dotsContainer.appendChild(dot);
  });

  const dots = Array.from(dotsContainer.children);

  function goTo(n) {
    currentIndex = (n + total) % total;
    track.style.transform = `translateX(-${currentIndex * 100}%)`;
    dots.forEach((d, i) => d.classList.toggle('active', i === currentIndex));
  }

  prevBtn.addEventListener('click', () => goTo(currentIndex - 1));
  nextBtn.addEventListener('click', () => goTo(currentIndex + 1));

  const carousel = document.querySelector('.carousel');
  let autoplay = setInterval(() => goTo(currentIndex + 1), 5000);
  carousel.addEventListener('mouseenter', () => clearInterval(autoplay));
  carousel.addEventListener('mouseleave', () => { autoplay = setInterval(() => goTo(currentIndex + 1), 5000); });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft')  goTo(currentIndex - 1);
    if (e.key === 'ArrowRight') goTo(currentIndex + 1);
  });

  let touchStart = 0;
  carousel.addEventListener('touchstart', (e) => { touchStart = e.changedTouches[0].screenX; });
  carousel.addEventListener('touchend',   (e) => {
    const diff = e.changedTouches[0].screenX - touchStart;
    if (diff < -50) goTo(currentIndex + 1);
    if (diff >  50) goTo(currentIndex - 1);
  });
})();
